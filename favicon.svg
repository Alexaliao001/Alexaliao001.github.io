<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="url(#star)" stroke-width="2"/>
  
  <!-- Star/Eye symbol -->
  <g filter="url(#glow)">
    <!-- Central eye -->
    <ellipse cx="50" cy="50" rx="20" ry="12" fill="none" stroke="url(#star)" stroke-width="2"/>
    <circle cx="50" cy="50" r="6" fill="url(#star)"/>
    
    <!-- Star rays -->
    <path d="M50 20 L52 35 L50 30 L48 35 Z" fill="url(#star)"/>
    <path d="M50 80 L52 65 L50 70 L48 65 Z" fill="url(#star)"/>
    <path d="M20 50 L35 52 L30 50 L35 48 Z" fill="url(#star)"/>
    <path d="M80 50 L65 52 L70 50 L65 48 Z" fill="url(#star)"/>
    
    <!-- Diagonal rays -->
    <path d="M28 28 L38 36 L34 34 L36 38 Z" fill="url(#star)" opacity="0.7"/>
    <path d="M72 28 L62 36 L66 34 L64 38 Z" fill="url(#star)" opacity="0.7"/>
    <path d="M28 72 L38 64 L34 66 L36 62 Z" fill="url(#star)" opacity="0.7"/>
    <path d="M72 72 L62 64 L66 66 L64 62 Z" fill="url(#star)" opacity="0.7"/>
  </g>
  
  <!-- Small stars decoration -->
  <circle cx="25" cy="20" r="1.5" fill="#fbbf24"/>
  <circle cx="75" cy="25" r="1" fill="#22d3ee"/>
  <circle cx="80" cy="70" r="1.5" fill="#f472b6"/>
  <circle cx="20" cy="75" r="1" fill="#fbbf24"/>
</svg>
